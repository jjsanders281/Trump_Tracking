name: Daily Ingest

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Validate daily inbox (dry-run)
        run: |
          python backend/scripts/daily_pipeline.py --date "$(date -u +%F)" --dry-run
