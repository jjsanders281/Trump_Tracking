services:
  - type: web
    name: trump-tracking-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SEED_SAMPLE_DATA
        value: "false"
      - key: APP_ENV
        value: "production"
      - key: DATABASE_URL
        sync: false
